<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PromptCraft - Coding Prompt Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="shortcut icon" href="./img/favicon.png" type="image/x-icon">
</head>

<body class="bg-gray-100 font-sans">

    <header class="bg-blue-700 text-white p-4 animate__animated animate__fadeInDown delay-500">
        <div class="container mx-auto flex items-center">
            <!-- Logo -->
            <a href="./index.html"><img src="./img/logo.png" class="h-12 w-12" alt="Logo"></a>

            <!-- Title -->
            <a href="./index.html">
                <h1 class="text-2xl font-bold ml-2">PromptCraft</h1>
            </a>

            <!-- Navigation -->
            <nav role="navigation" class="ml-auto">
                <ul class="flex space-x-4">
                    <li><a target="_blank" href="https://www.instagram.com/naman_080/"
                            class="text-white hover:text-yellow-400 text-2xl" aria-label="Instagram"><i
                                class="fa-brands fa-instagram"></i></a></li>
                    <li><a target="_blank" href="https://github.com/Naman0807"
                            class="text-white hover:text-yellow-400 text-2xl" aria-label="GitHub"><i
                                class="fa-brands fa-github"></i></a></li>
                    <li><a target="_blank" href="https://www.linkedin.com/in/namanparmar/"
                            class="text-white hover:text-yellow-400 text-2xl" aria-label="LinkedIn"><i
                                class="fa-brands fa-linkedin"></i></a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="bg-gray-800 text-white p-4 animate__animated animate__fadeInDown delay-500">
        <div class="container mx-auto text-center">
            <p class="text-lg font-medium">
                Welcome to PromptCraft - Your Coding Prompt Generator! Generate custom coding prompts based on language,
                task. Use this tool to inspire your coding practice and creativity.
            </p>
        </div>
    </div>


    <div class="container mx-auto p-4 sm:p-8 bg-gray-200 rounded-lg mt-4">

        <h2 class="text-4xl font-bold mb-8 text-gray-800 animate__animated animate__fadeInDown delay-1000">
            PromptCraft
        </h2>


        <!-- Coding Prompt Generator Section (JavaScript for interactivity) -->
        <section id="prompt-generator"
            class="mb-8 bg-white p-8 rounded shadow-md animate__animated animate__fadeIn delay-500">
            <h3 class="text-2xl font-bold mb-4 text-gray-800">Coding Prompt Generator</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="category" class="block text-sm font-medium text-gray-700">Select Category:</label>
                    <select id="category"
                        class="mt-1 p-2 border border-gray-300 rounded w-full focus:outline-none focus:border-blue-500">
                        <option value="website">Website</option>
                        <option value="function">Function</option>
                        <option value="database">Database schema</option>
                    </select>
                </div>

                <div>
                    <label for="language" class="block text-sm font-medium text-gray-700" id="language-label">Select
                        Language:</label>
                    <select id="language"
                        class="mt-1 p-2 border border-gray-300 rounded w-full focus:outline-none focus:border-blue-500">
                        <option value="HTML">HTML</option>
                        <option value="Tailwind">Tailwind</option>
                        <option value="BootStrap">BootStrap</option>
                    </select>
                </div>
                <div>
                    <label for="task" class="block text-sm font-medium text-gray-700">What you want to
                        do:</label>
                    <input placeholder="Eg. Make a api call" type="text" id="task"
                        class="mt-1 p-2 border border-gray-300 rounded w-full focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label for="action" class="block text-sm font-medium text-gray-700"> Describe:</label>
                    <input placeholder="Eg. For the Weather" type="text" id="action"
                        class="mt-1 p-2 border border-gray-300 rounded w-full focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label for="additional-details" class="block text-sm font-medium text-gray-700">Additional
                        Details (if any):</label>
                    <textarea placeholder="Add any specific details..." id="additional-details"
                        class="mt-1 p-2 border border-gray-300 rounded resize-none w-full focus:outline-none focus:border-blue-500"></textarea>
                </div>
            </div>

            <div class="space-x-2">
                <button id="generate-custom-prompt" type="button"
                    class="mt-8 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-700 transform hover:scale-105 transition duration-300 delay-200 focus:outline-none focus:shadow-outline-blue">Generate</button>

                <button id="copy-to-clipboard" type="button"
                    class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-700 transform hover:scale-105 transition duration-300 delay-200 focus:outline-none focus:shadow-outline-green">Copy</button>

                <button id="clear-fields" type="button"
                    class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-700 transform hover:scale-105 transition duration-300 delay-200 focus:outline-none focus:shadow-outline-red">Clear</button>
            </div>

            <p id="copy-acknowledgment" class="mt-2 text-green-500"></p>

            <div class="col-span-2">
                <p id="custom-prompt-result" class="mt-6 font-bold break-words text-gray-800"></p>
            </div>
        </section>
    </div>
    <footer class="bg-gray-700 text-white p-4 text-center">
        <p>&copy; 2024 PromptCraft. All rights reserved.</p>
    </footer>

    <script src="./script.js"></script>
</body>

</html>
